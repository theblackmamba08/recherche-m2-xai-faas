<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 1450" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
    <marker id="arrowR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#C62828"/>
    </marker>
    <marker id="arrowG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2E7D32"/>
    </marker>
    <marker id="arrowY" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#F57F17"/>
    </marker>
  </defs>

  <!-- ===== TITRE ===== -->
  <text x="550" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1A237E">Architecture SoftCAM-Transformer — Vue Globale Revisitée</text>
  <text x="550" y="58" text-anchor="middle" font-size="13" fill="#555" font-style="italic">TimeSeriesTransformer HuggingFace + Evidence Layer H1 · d_model=32</text>

  <!-- ===== SECTION ENTRÉES ===== -->
  <rect x="50" y="75" width="1000" height="210" rx="8" fill="#F8F8FF" stroke="#9E9E9E" stroke-width="1.2" stroke-dasharray="6,3"/>
  <text x="550" y="95" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">ENTRÉES — 4 types de tenseurs</text>

  <!-- past_values -->
  <rect x="65" y="105" width="218" height="70" rx="6" fill="#BBDEFB" stroke="#1565C0" stroke-width="1.8"/>
  <text x="174" y="124" text-anchor="middle" font-size="12" font-weight="bold" fill="#0D47A1">past_values</text>
  <text x="174" y="141" text-anchor="middle" font-size="11" fill="#1565C0">(B, 422)</text>
  <text x="174" y="156" text-anchor="middle" font-size="10" fill="#1565C0" font-style="italic">contexte 240 min + lags</text>
  <text x="174" y="168" text-anchor="middle" font-size="10" fill="#1565C0" font-style="italic">22 lags (max ≈ 182 min)</text>

  <!-- past_time_features -->
  <rect x="298" y="105" width="218" height="70" rx="6" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1.8"/>
  <text x="407" y="124" text-anchor="middle" font-size="12" font-weight="bold" fill="#1B5E20">past_time_features</text>
  <text x="407" y="141" text-anchor="middle" font-size="11" fill="#2E7D32">(B, 422, 6)</text>
  <text x="407" y="156" text-anchor="middle" font-size="10" fill="#2E7D32" font-style="italic">sin/cos heure, jour, semaine</text>
  <text x="407" y="168" text-anchor="middle" font-size="10" fill="#2E7D32" font-style="italic">+ log-âge série</text>

  <!-- past_observed_mask -->
  <rect x="531" y="105" width="218" height="70" rx="6" fill="#E1BEE7" stroke="#6A1B9A" stroke-width="1.8"/>
  <text x="640" y="124" text-anchor="middle" font-size="12" font-weight="bold" fill="#4A148C">past_observed_mask</text>
  <text x="640" y="141" text-anchor="middle" font-size="11" fill="#6A1B9A">(B, 422)</text>
  <text x="640" y="156" text-anchor="middle" font-size="10" fill="#6A1B9A" font-style="italic">masque binaire ∈ {0,1}</text>
  <text x="640" y="168" text-anchor="middle" font-size="10" fill="#6A1B9A" font-style="italic">1 = valeur observée</text>

  <!-- static_cat -->
  <rect x="764" y="105" width="274" height="70" rx="6" fill="#FFE0B2" stroke="#E65100" stroke-width="1.8"/>
  <text x="901" y="124" text-anchor="middle" font-size="12" font-weight="bold" fill="#BF360C">static_cat_features</text>
  <text x="901" y="141" text-anchor="middle" font-size="11" fill="#E65100">(B, 1)  ID ∈ {0…4}</text>
  <text x="901" y="156" text-anchor="middle" font-size="10" fill="#E65100" font-style="italic">Embedding(5, emb_dim=2)</text>
  <text x="901" y="168" text-anchor="middle" font-size="10" fill="#E65100" font-style="italic">→ (B, 2) broadcast (B, 240/120, 2)</text>

  <!-- future_time_features (training) -->
  <rect x="200" y="192" width="700" height="36" rx="5" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="550" y="207" text-anchor="middle" font-size="11" fill="#1B5E20" font-weight="bold">future_time_features (B, 120, 6) + future_values (B, 120) — TRAINING · teacher forcing</text>
  <text x="550" y="222" text-anchor="middle" font-size="10" fill="#2E7D32" font-style="italic">future_values absent à l'inférence (model.generate) · future_time_features toujours disponibles</text>

  <!-- Flèches vers encodeur -->
  <line x1="550" y1="285" x2="550" y2="318" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== EMBEDDING COMMUN ===== -->
  <rect x="260" y="290" width="580" height="42" rx="7" fill="#FFFDE7" stroke="#F9A825" stroke-width="2"/>
  <text x="550" y="308" text-anchor="middle" font-size="12" font-weight="bold" fill="#5D4037">Projection → d_model=32</text>
  <text x="550" y="325" text-anchor="middle" font-size="11" fill="#5D4037">ValueEmbed(23→32) ⊕ TimeEmbed(6→32) ⊕ StaticEmbed(2→32)  →  (B, ctx, 32)</text>

  <line x1="550" y1="332" x2="550" y2="362" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== ENCODEUR ===== -->
  <rect x="160" y="365" width="780" height="110" rx="8" fill="#ECEFF1" stroke="#455A64" stroke-width="2"/>
  <text x="550" y="386" text-anchor="middle" font-size="14" font-weight="bold" fill="#263238">ENCODEUR   (inchangé)</text>
  <text x="550" y="405" text-anchor="middle" font-size="12" fill="#455A64">4 × [Multi-Head Self-Attention (2 têtes, head_dim=16) → Add&amp;Norm → FFN → Add&amp;Norm]</text>
  <text x="550" y="423" text-anchor="middle" font-size="12" fill="#455A64">Entrée : (B, 240, 32)  →  Sortie : (B, 240, 32)</text>
  <text x="550" y="441" text-anchor="middle" font-size="11" fill="#546E7A" font-style="italic">attention scores : (B, 2, 240, 240)  sauvegardés via output_attentions=True  [→ H3]</text>
  <text x="550" y="457" text-anchor="middle" font-size="12" font-weight="bold" fill="#263238">encoder_last_hidden_state  (B, 240, 32)</text>

  <!-- Bypass encodeur vers evidence layer -->
  <path d="M 940 420 L 1050 420 L 1050 1000 L 900 1000" fill="none" stroke="#F9A825" stroke-width="2" stroke-dasharray="7,4" marker-end="url(#arrowY)"/>
  <text x="898" y="660" font-size="10" fill="#5D4037" font-style="italic" transform="rotate(90 1058 660)">encoder_embeddings (B,240,32) → combinaison linéaire</text>

  <line x1="550" y1="475" x2="550" y2="508" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== DÉCODEUR ===== -->
  <rect x="160" y="510" width="780" height="132" rx="8" fill="#ECEFF1" stroke="#455A64" stroke-width="2"/>
  <text x="550" y="532" text-anchor="middle" font-size="14" font-weight="bold" fill="#263238">DÉCODEUR   (inchangé)</text>
  <text x="550" y="551" text-anchor="middle" font-size="12" fill="#455A64">4 × [Masked Self-Attn → Add&amp;Norm → Cross-Attn (Q=déc, K=V=enc) → Add&amp;Norm → FFN → Add&amp;Norm]</text>
  <text x="550" y="569" text-anchor="middle" font-size="12" fill="#455A64">Entrée déc : (B, 120, 32)  +  enc K,V : (B, 240, 32)  →  Sortie : (B, 120, 32)</text>
  <text x="550" y="634" text-anchor="middle" font-size="12" font-weight="bold" fill="#263238">decoder_last_hidden_state  (B, 120, 32)</text>

  <line x1="550" y1="642" x2="550" y2="672" stroke="#C62828" stroke-width="2.5" marker-end="url(#arrowR)"/>

  <!-- ===== EVIDENCE LAYER (NOUVEAU — H1) ===== -->
  <rect x="100" y="675" width="840" height="130" rx="10" fill="#FFEBEE" stroke="#C62828" stroke-width="3"/>
  <text x="520" y="698" text-anchor="middle" font-size="16" font-weight="bold" fill="#B71C1C">★  EVIDENCE LAYER  (nouveauté H1)</text>

  <!-- Sous-bloc gauche : calcul evidence -->
  <rect x="115" y="710" width="370" height="82" rx="6" fill="#FFCDD2" stroke="#C62828" stroke-width="1.8"/>
  <text x="300" y="729" text-anchor="middle" font-size="12" font-weight="bold" fill="#B71C1C">Calcul des poids d'évidence</text>
  <text x="300" y="746" text-anchor="middle" font-size="11" fill="#C62828">Linear(d_model=32 → ctx=240)</text>
  <text x="300" y="762" text-anchor="middle" font-size="11" fill="#C62828">→ Softmax(dim=-1)</text>
  <text x="300" y="778" text-anchor="middle" font-size="12" font-weight="bold" fill="#B71C1C">→ M  (B, 120, 240)</text>

  <!-- Sous-bloc droit : ElasticNet -->
  <rect x="498" y="710" width="432" height="82" rx="6" fill="#FFF9C4" stroke="#F57F17" stroke-width="1.8"/>
  <text x="714" y="729" text-anchor="middle" font-size="12" font-weight="bold" fill="#E65100">Régularisation ElasticNet  (ajoutée à la loss)</text>
  <text x="714" y="748" text-anchor="middle" font-size="12" fill="#E65100">ℒ = ℒ_forecast  +  α‖M‖₁  +  β‖M‖₂²</text>
  <text x="714" y="766" text-anchor="middle" font-size="11" fill="#E65100">L1 → poids parcimonieux (peu de positions clés)</text>
  <text x="714" y="782" text-anchor="middle" font-size="11" fill="#E65100">L2 → lissage (éviter les pics isolés)</text>

  <line x1="550" y1="805" x2="550" y2="835" stroke="#C62828" stroke-width="2.5" marker-end="url(#arrowR)"/>

  <!-- ===== CARTE D'ÉVIDENCE ===== -->
  <rect x="260" y="838" width="580" height="90" rx="8" fill="#FFEBEE" stroke="#C62828" stroke-width="2.5"/>
  <text x="550" y="860" text-anchor="middle" font-size="15" font-weight="bold" fill="#B71C1C">CARTE D'ÉVIDENCE   M  (B, 120, 240)</text>
  <text x="550" y="880" text-anchor="middle" font-size="12" fill="#C62828">M[t, s] = importance du pas s du contexte</text>
  <text x="550" y="898" text-anchor="middle" font-size="12" fill="#C62828">pour prédire le pas futur t</text>
  <text x="550" y="916" text-anchor="middle" font-size="11" fill="#B71C1C" font-style="italic">→ l'EXPLICATION, produite gratuitement en 1 forward pass</text>

  <!-- Branche droite : explication gratuite -->
  <path d="M 840 880 L 950 880" fill="none" stroke="#E65100" stroke-width="2.5" marker-end="url(#arrowY)"/>
  <rect x="955" y="854" width="80" height="40" rx="6" fill="#FFF3E0" stroke="#E65100" stroke-width="2.5"/>
  <text x="995" y="873" text-anchor="middle" font-size="11" font-weight="bold" fill="#E65100">EXPLICATION</text>
  <text x="995" y="883" text-anchor="middle" font-size="9" fill="#E65100" font-style="italic">fidèle</text>

  <line x1="550" y1="928" x2="550" y2="958" stroke="#C62828" stroke-width="2.5" marker-end="url(#arrowR)"/>

  <!-- ===== COMBINAISON LINÉAIRE ===== -->
  <rect x="210" y="960" width="680" height="70" rx="8" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
  <text x="550" y="982" text-anchor="middle" font-size="14" font-weight="bold" fill="#1B5E20">COMBINAISON LINÉAIRE</text>
  <text x="550" y="1000" text-anchor="middle" font-size="12" fill="#1B5E20">h[t] = Σ_s  M[t,s] × encoder_embeddings[s]</text>
  <text x="550" y="1018" text-anchor="middle" font-size="11" fill="#1B5E20" font-style="italic">enc_emb (B,240,32) × M (B,120,240) → h (B,120,32)</text>

  <line x1="550" y1="1030" x2="550" y2="1062" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== PROJECTION FINALE ===== -->
  <rect x="345" y="1065" width="410" height="40" rx="7" fill="#ECEFF1" stroke="#455A64" stroke-width="1.5"/>
  <text x="550" y="1082" text-anchor="middle" font-size="12" font-weight="bold" fill="#263238">parameter_projection — Linear(32 → 3)</text>
  <text x="550" y="1098" text-anchor="middle" font-size="11" fill="#455A64">→ (B, 120, 3) :  loc, scale, df  de la distribution StudentT</text>

  <line x1="550" y1="1105" x2="550" y2="1138" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== PRÉDICTION ===== -->
  <rect x="320" y="1140" width="460" height="59" rx="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="2.5"/>
  <text x="550" y="1162" text-anchor="middle" font-size="14" font-weight="bold" fill="#0D47A1">PRÉDICTION</text>
  <text x="550" y="1181" text-anchor="middle" font-size="12" fill="#0D47A1">StudentT → 100 échantillons → médiane</text>
  <text x="550" y="1196" text-anchor="middle" font-size="12" font-weight="bold" fill="#0D47A1">(B, 100, 120)  →  médiane (B, 120)</text>

  <!-- ===== LÉGENDE ===== -->
  <rect x="30" y="1235" width="1040" height="200" rx="8" fill="#FAFAFA" stroke="#9E9E9E" stroke-width="1"/>
  <text x="60" y="1258" font-size="13" font-weight="bold" fill="#333">Légende</text>
  <rect x="60" y="1270" width="18" height="13" fill="#ECEFF1" stroke="#455A64" stroke-width="1.5"/>
  <text x="88" y="1282" font-size="11" fill="#333">Composant standard TimeSeriesTransformer (inchangé vs FAYAM)</text>
  <rect x="60" y="1292" width="18" height="13" fill="#FFFDE7" stroke="#F9A825" stroke-width="1.5"/>
  <text x="88" y="1304" font-size="11" fill="#333">Représentation latente (embeddings) — espace d_model=32</text>
  <rect x="60" y="1314" width="18" height="13" fill="#FFEBEE" stroke="#C62828" stroke-width="2"/>
  <text x="88" y="1326" font-size="11" fill="#333">Nouveauté H1 — Evidence Layer (remplace parameter_projection directe)</text>
  <rect x="60" y="1336" width="18" height="13" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="88" y="1348" font-size="11" fill="#333">Combinaison interprétable : prédiction = formule explicite (Σ poids × contexte)</text>
  <rect x="60" y="1358" width="18" height="13" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
  <text x="88" y="1370" font-size="11" fill="#333">Explication gratuite — 1 forward pass = prédiction + carte d'évidence</text>

  <!-- Colonne droite légende -->
  <line x1="580" y1="1260" x2="580" y2="1425" stroke="#DDD" stroke-width="1"/>
  <text x="600" y="1275" font-size="11" font-weight="bold" fill="#333">Différence clé : H1 vs TFT</text>
  <text x="600" y="1293" font-size="10" fill="#555">TFT (Lim et al. 2019) : interprétabilité par attention</text>
  <text x="600" y="1309" font-size="10" fill="#555">→ attention ≠ explication (Jain &amp; Wallace 2019)</text>
  <text x="600" y="1325" font-size="10" fill="#555">H1 SoftCAM-Transformer : combinaison linéaire exacte</text>
  <text x="600" y="1341" font-size="10" fill="#555">→ fidélité par construction (M est le calcul, pas une</text>
  <text x="600" y="1357" font-size="10" fill="#555">   approximation post-hoc)</text>
  <text x="600" y="1378" font-size="10" font-weight="bold" fill="#1A237E">Hypothèses à valider sur Cluster 4 :</text>
  <text x="600" y="1394" font-size="10" fill="#333">H1.A : M pointe les heures pic (17h-19h) et creux (2h-6h)</text>
  <text x="600" y="1410" font-size="10" fill="#333">H1.B : lags 1440/2880 dominants dans cross_attentions</text>
  <text x="600" y="1425" font-size="10" fill="#333">H1.C : R²≥0.30, Spearman≥0.85 conservés après Evidence Layer</text>
</svg>
