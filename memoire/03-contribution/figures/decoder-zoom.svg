<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1250 980" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
    <marker id="arrB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1565C0"/>
    </marker>
    <marker id="arrY" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#F57F17"/>
    </marker>
    <marker id="arrR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#C62828"/>
    </marker>
  </defs>

  <!-- ===== TITRE ===== -->
  <text x="625" y="28" text-anchor="middle" font-size="20" font-weight="bold" fill="#1A237E">Zoom Décodeur — TimeSeriesTransformer</text>
  <text x="625" y="50" text-anchor="middle" font-size="12" fill="#555" font-style="italic">prediction_length=120 · d_model=32 · n_heads=2 · decoder_layers=4</text>

  <!-- ===== ENTRÉE ENCODEUR (gauche, en arrivant) ===== -->
  <rect x="8" y="65" width="260" height="148" rx="7" fill="#E3F2FD" stroke="#1565C0" stroke-width="2.5"/>
  <text x="138" y="87" text-anchor="middle" font-size="13" font-weight="bold" fill="#0D47A1">encoder_last_hidden_state</text>
  <text x="138" y="106" text-anchor="middle" font-size="13" font-weight="bold" fill="#0D47A1">(B, 240, 32)</text>
  <text x="138" y="124" text-anchor="middle" font-size="11" fill="#1565C0">issu de l'encodeur</text>
  <text x="138" y="142" text-anchor="middle" font-size="11" fill="#1565C0">→ K et V de la</text>
  <text x="138" y="158" text-anchor="middle" font-size="11" fill="#1565C0">cross-attention</text>
  <text x="138" y="175" text-anchor="middle" font-size="10" fill="#1565C0" font-style="italic">(240 positions de contexte)</text>
  <text x="138" y="204" text-anchor="middle" font-size="12" font-weight="bold" fill="#1565C0">K, V →</text>

  <!-- ===== ENTRÉES DÉCODEUR (droite) ===== -->

  <!-- future_values (training only) -->
  <rect x="440" y="65" width="260" height="88" rx="7" fill="#BBDEFB" stroke="#1565C0" stroke-width="2"/>
  <text x="570" y="84" text-anchor="middle" font-size="12" font-weight="bold" fill="#0D47A1">future_values</text>
  <text x="570" y="100" text-anchor="middle" font-size="12" font-weight="bold" fill="#0D47A1">(B, 120)</text>
  <text x="570" y="116" text-anchor="middle" font-size="10" fill="#1565C0">TRAINING uniquement</text>
  <text x="570" y="145" text-anchor="middle" font-size="9" fill="#1565C0" font-style="italic">absent à l'inférence (model.generate)</text>

  <!-- future_time_features -->
  <rect x="715" y="65" width="260" height="88" rx="7" fill="#C8E6C9" stroke="#2E7D32" stroke-width="2"/>
  <text x="845" y="84" text-anchor="middle" font-size="12" font-weight="bold" fill="#1B5E20">future_time_features</text>
  <text x="845" y="100" text-anchor="middle" font-size="12" font-weight="bold" fill="#1B5E20">(B, 120, 6)</text>
  <text x="845" y="116" text-anchor="middle" font-size="10" fill="#2E7D32">features temporelles</text>
  <text x="845" y="130" text-anchor="middle" font-size="10" fill="#2E7D32">des 120 pas futurs</text>
  <text x="845" y="145" text-anchor="middle" font-size="9" fill="#2E7D32" font-style="italic">connues à l'avance (horaire, jour…)</text>

  <!-- static (même embedding réutilisé) -->
  <rect x="990" y="65" width="250" height="88" rx="7" fill="#FFE0B2" stroke="#E65100" stroke-width="2"/>
  <text x="1115" y="84" text-anchor="middle" font-size="12" font-weight="bold" fill="#BF360C">static_cat (réutilisé)</text>
  <text x="1115" y="100" text-anchor="middle" font-size="12" font-weight="bold" fill="#BF360C">(B, 2) → (B, 120, 2)</text>
  <text x="1115" y="116" text-anchor="middle" font-size="10" fill="#E65100">même embedding que</text>
  <text x="1115" y="130" text-anchor="middle" font-size="10" fill="#E65100">l'encodeur, partagé</text>
  <text x="1115" y="145" text-anchor="middle" font-size="9" fill="#E65100" font-style="italic">→ Linear(2→32) → (B,120,32)</text>

  <!-- Flèches vers embedding décodeur -->
  <line x1="570" y1="153" x2="570" y2="183" stroke="#1565C0" stroke-width="1.8" marker-end="url(#arr)"/>
  <line x1="845" y1="153" x2="845" y2="183" stroke="#2E7D32" stroke-width="1.8" marker-end="url(#arr)"/>
  <line x1="1115" y1="153" x2="1115" y2="183" stroke="#E65100" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- Embedding décodeur bloc -->
  <rect x="440" y="185" width="800" height="52" rx="6" fill="#FFFDE7" stroke="#F9A825" stroke-width="1.8"/>
  <text x="840" y="205" text-anchor="middle" font-size="12" font-weight="bold" fill="#5D4037">Embedding décodeur : future_values + lags + time_features + static → Linear → ⊕</text>
  <text x="840" y="222" text-anchor="middle" font-size="12" font-weight="bold" fill="#33691E">decoder_input : (B, 120, 32)</text>

  <!-- Flèche vers couche décodeur -->
  <line x1="840" y1="237" x2="840" y2="262" stroke="#333" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ===== SECTION 3 : COUCHE DÉCODEUR DÉTAILLÉE ===== -->
  <rect x="25" y="264" width="1200" height="545" rx="8" fill="#ECEFF1" stroke="#455A64" stroke-width="2"/>
  <text x="625" y="283" text-anchor="middle" font-size="13" font-weight="bold" fill="#263238">COUCHE DÉCODEUR — détail couche 1/4  (×4 couches identiques)</text>
  <text x="625" y="299" text-anchor="middle" font-size="11" fill="#546E7A" font-style="italic">entrée : (B, 120, 32)  +  encoder K,V (B, 240, 32)  →  sortie : (B, 120, 32)</text>

  <!-- ── A : Masked Multi-Head Self-Attention ── -->
  <rect x="38" y="308" width="1187" height="120" rx="6" fill="#FAFAFA" stroke="#78909C" stroke-width="1.2"/>
  <text x="625" y="327" text-anchor="middle" font-size="12" font-weight="bold" fill="#37474F">A — Masked Multi-Head Self-Attention (causal — le pas t ne voit que les pas 0…t-1)</text>

  <rect x="52" y="337" width="220" height="50" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.2"/>
  <text x="162" y="357" text-anchor="middle" font-size="11" font-weight="bold" fill="#0D47A1">Q = Linear(32→32)</text>
  <text x="162" y="373" text-anchor="middle" font-size="11" fill="#0D47A1">(B,120,32) → (B,2,120,16)</text>

  <rect x="285" y="337" width="220" height="50" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.2"/>
  <text x="395" y="357" text-anchor="middle" font-size="11" font-weight="bold" fill="#0D47A1">K = Linear(32→32)</text>
  <text x="395" y="373" text-anchor="middle" font-size="11" fill="#0D47A1">(B,120,32) → (B,2,120,16)</text>

  <rect x="518" y="337" width="220" height="50" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.2"/>
  <text x="628" y="357" text-anchor="middle" font-size="11" font-weight="bold" fill="#0D47A1">V = Linear(32→32)</text>
  <text x="628" y="373" text-anchor="middle" font-size="11" fill="#0D47A1">(B,120,32) → (B,2,120,16)</text>

  <rect x="750" y="330" width="460" height="65" rx="5" fill="#FFF3E0" stroke="#EF6C00" stroke-width="1.2"/>
  <text x="980" y="350" text-anchor="middle" font-size="11" font-weight="bold" fill="#E65100">Scores = softmax( QKᵀ/√16 + mask )</text>
  <text x="980" y="367" text-anchor="middle" font-size="12" font-weight="bold" fill="#E65100">→ (B, 2, 120, 120)</text>
  <text x="980" y="381" text-anchor="middle" font-size="10" fill="#EF6C00" font-style="italic">masque triangulaire inférieur — causal</text>
  <text x="980" y="392" text-anchor="middle" font-size="10" fill="#EF6C00" font-style="italic">Output Scores×V→concat→(B,120,32)</text>

  <!-- Add & LayerNorm A -->
  <line x1="625" y1="428" x2="625" y2="448" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="420" y="449" width="410" height="22" rx="4" fill="#E0E0E0" stroke="#616161" stroke-width="1"/>
  <text x="625" y="464" text-anchor="middle" font-size="11" font-weight="bold" fill="#212121">Résidu + LayerNorm → (B, 120, 32)</text>

  <!-- ── B : Cross-Attention ── -->
  <line x1="625" y1="471" x2="625" y2="490" stroke="#333" stroke-width="1.8" marker-end="url(#arr)"/>
  <rect x="38" y="492" width="1187" height="162" rx="6" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.8"/>
  <text x="625" y="512" text-anchor="middle" font-size="12" font-weight="bold" fill="#1B5E20">B — Cross-Attention  (Q = décodeur, K = V = encodeur)</text>
  <text x="625" y="527" text-anchor="middle" font-size="11" fill="#2E7D32" font-style="italic">chaque pas futur t interroge les 240 positions du contexte passé</text>

  <rect x="52" y="535" width="250" height="56" rx="4" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1.2"/>
  <text x="177" y="554" text-anchor="middle" font-size="11" font-weight="bold" fill="#1B5E20">Q = Linear(32→32)</text>
  <text x="177" y="570" text-anchor="middle" font-size="11" fill="#1B5E20">depuis décodeur (B,120,32)</text>
  <text x="177" y="583" text-anchor="middle" font-size="11" fill="#1B5E20">→ (B, 2, 120, 16)</text>

  <rect x="315" y="535" width="285" height="56" rx="4" fill="#BBDEFB" stroke="#1565C0" stroke-width="1.8"/>
  <text x="457" y="554" text-anchor="middle" font-size="11" font-weight="bold" fill="#0D47A1">K = Linear(32→32)</text>
  <text x="457" y="570" text-anchor="middle" font-size="11" fill="#0D47A1">depuis encodeur (B,240,32)</text>
  <text x="457" y="583" text-anchor="middle" font-size="11" fill="#0D47A1">→ (B, 2, 240, 16)</text>

  <rect x="615" y="535" width="285" height="56" rx="4" fill="#BBDEFB" stroke="#1565C0" stroke-width="1.8"/>
  <text x="757" y="554" text-anchor="middle" font-size="11" font-weight="bold" fill="#0D47A1">V = Linear(32→32)</text>
  <text x="757" y="570" text-anchor="middle" font-size="11" fill="#0D47A1">depuis encodeur (B,240,32)</text>
  <text x="757" y="583" text-anchor="middle" font-size="11" fill="#0D47A1">→ (B, 2, 240, 16)</text>

  <!-- Cross-attention scores box -->
  <rect x="915" y="528" width="296" height="118" rx="5" fill="#FFEBEE" stroke="#C62828" stroke-width="2"/>
  <text x="1063" y="549" text-anchor="middle" font-size="11" font-weight="bold" fill="#B71C1C">Scores = softmax(QKᵀ/√16)</text>
  <text x="1063" y="567" text-anchor="middle" font-size="14" font-weight="bold" fill="#B71C1C">(B, 2, 120, 240)</text>
  <text x="1063" y="585" text-anchor="middle" font-size="10" fill="#C62828">⬆ cross_attentions sauvegardés</text>
  <text x="1063" y="598" text-anchor="middle" font-size="10" fill="#C62828">(output_attentions=True)</text>
  <text x="1063" y="613" text-anchor="middle" font-size="10" fill="#C62828">ligne t = poids sur les 240 pos.</text>
  <text x="1063" y="626" text-anchor="middle" font-size="10" fill="#C62828">de contexte pour prédire step t</text>
  <text x="1063" y="640" text-anchor="middle" font-size="10" fill="#C62828" font-style="italic">→ matière première de H3</text>

  <text x="625" y="606" text-anchor="middle" font-size="11" fill="#1B5E20">Output : Scores × V → concat → Linear(32→32)</text>
  <text x="625" y="622" text-anchor="middle" font-size="12" font-weight="bold" fill="#1B5E20">→ (B, 120, 32)</text>

  <!-- Add & LayerNorm B -->
  <line x1="625" y1="655" x2="625" y2="674" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="420" y="675" width="410" height="22" rx="4" fill="#E0E0E0" stroke="#616161" stroke-width="1"/>
  <text x="625" y="690" text-anchor="middle" font-size="11" font-weight="bold" fill="#212121">Résidu + LayerNorm → (B, 120, 32)</text>

  <!-- ── C : FFN ── -->
  <line x1="625" y1="697" x2="625" y2="716" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="380" y="717" width="490" height="36" rx="5" fill="#FFF3E0" stroke="#EF6C00" stroke-width="1.5"/>
  <text x="625" y="733" text-anchor="middle" font-size="11" font-weight="bold" fill="#E65100">C — FFN : Linear(32→32) → GELU → Linear(32→32)</text>
  <text x="625" y="748" text-anchor="middle" font-size="11" fill="#EF6C00">→ (B, 120, 32)</text>

  <!-- Add & LayerNorm C -->
  <line x1="625" y1="753" x2="625" y2="772" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="420" y="773" width="410" height="22" rx="4" fill="#E0E0E0" stroke="#616161" stroke-width="1"/>
  <text x="625" y="788" text-anchor="middle" font-size="11" font-weight="bold" fill="#212121">Résidu + LayerNorm → (B, 120, 32)</text>

  <!-- ===== × 3 couches ===== -->
  <line x1="625" y1="812" x2="625" y2="834" stroke="#333" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="340" y="815" width="570" height="30" rx="6" fill="#B0BEC5" stroke="#455A64" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="625" y="835" text-anchor="middle" font-size="12" font-weight="bold" fill="#263238">× 3 couches identiques (couches 2 / 3 / 4)</text>

  <!-- ===== OUTPUT ===== -->
  <line x1="625" y1="845" x2="625" y2="868" stroke="#333" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="220" y="869" width="810" height="58" rx="8" fill="#E8EAF6" stroke="#3949AB" stroke-width="2.5"/>
  <text x="625" y="890" text-anchor="middle" font-size="14" font-weight="bold" fill="#1A237E">decoder_last_hidden_state</text>
  <text x="625" y="909" text-anchor="middle" font-size="13" font-weight="bold" fill="#1A237E">(B, 120, 32)</text>
  <text x="625" y="924" text-anchor="middle" font-size="11" fill="#3949AB" font-style="italic">→ 120 représentations latentes — une par pas de prédiction — entrent dans la tête de sortie</text>

  <!-- Flèche K,V encodeur → cross-attention -->
  <path d="M 268 150 L 268 650 L 906 650" fill="none" stroke="#1565C0" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#arrB)"/>
</svg>
