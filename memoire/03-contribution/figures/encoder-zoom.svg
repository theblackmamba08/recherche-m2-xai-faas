<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1250 975" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
    <marker id="arrG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2E7D32"/>
    </marker>
    <marker id="arrY" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#F57F17"/>
    </marker>
  </defs>

  <!-- ===== TITRE ===== -->
  <text x="625" y="28" text-anchor="middle" font-size="20" font-weight="bold" fill="#1A237E">Zoom Encodeur — TimeSeriesTransformer</text>
  <text x="625" y="50" text-anchor="middle" font-size="12" fill="#555" font-style="italic">context_length=240 · d_model=32 · n_heads=2 · encoder_layers=4 · freq='1T' · n_lags=22 · batch=256</text>

  <!-- ===== SECTION 1 : ENTRÉES BRUTES ===== -->

  <!-- past_values (bleu) -->
  <rect x="10" y="65" width="285" height="88" rx="7" fill="#BBDEFB" stroke="#1565C0" stroke-width="2"/>
  <text x="152" y="85" text-anchor="middle" font-size="13" font-weight="bold" fill="#0D47A1">past_values</text>
  <text x="152" y="104" text-anchor="middle" font-size="13" font-weight="bold" fill="#0D47A1">(256, 422)</text>
  <text x="152" y="120" text-anchor="middle" font-size="11" fill="#1565C0">= contexte (240) + fenêtre lags (182)</text>
  <text x="152" y="144" text-anchor="middle" font-size="10" fill="#1565C0" font-style="italic">série de charge brute — invocations/min</text>

  <!-- past_time_features (vert) -->
  <rect x="310" y="65" width="285" height="88" rx="7" fill="#C8E6C9" stroke="#2E7D32" stroke-width="2"/>
  <text x="452" y="85" text-anchor="middle" font-size="13" font-weight="bold" fill="#1B5E20">past_time_features</text>
  <text x="452" y="104" text-anchor="middle" font-size="13" font-weight="bold" fill="#1B5E20">(256, 422, 6)</text>
  <text x="452" y="120" text-anchor="middle" font-size="11" fill="#2E7D32">sin/cos(heure · jour · semaine)</text>
  <text x="452" y="136" text-anchor="middle" font-size="11" fill="#2E7D32">+ log-âge de la série</text>
  <text x="452" y="144" text-anchor="middle" font-size="10" fill="#2E7D32" font-style="italic">→ alignées sur la fenêtre complète</text>

  <!-- past_observed_mask (violet) -->
  <rect x="610" y="65" width="285" height="88" rx="7" fill="#E1BEE7" stroke="#6A1B9A" stroke-width="2"/>
  <text x="752" y="85" text-anchor="middle" font-size="13" font-weight="bold" fill="#4A148C">past_observed_mask</text>
  <text x="752" y="104" text-anchor="middle" font-size="13" font-weight="bold" fill="#4A148C">(256, 422)</text>
  <text x="752" y="120" text-anchor="middle" font-size="11" fill="#6A1B9A">masque binaire ∈ {0, 1}</text>
  <text x="752" y="136" text-anchor="middle" font-size="11" fill="#6A1B9A">1 = valeur observée</text>
  <text x="752" y="144" text-anchor="middle" font-size="10" fill="#6A1B9A" font-style="italic">0 = NaN (série incomplète)</text>

  <!-- static_categorical_features (orange) -->
  <rect x="910" y="65" width="330" height="88" rx="7" fill="#FFE0B2" stroke="#E65100" stroke-width="2"/>
  <text x="1075" y="85" text-anchor="middle" font-size="13" font-weight="bold" fill="#BF360C">static_categorical_features</text>
  <text x="1075" y="104" text-anchor="middle" font-size="13" font-weight="bold" fill="#BF360C">(256, 1)</text>
  <text x="1075" y="120" text-anchor="middle" font-size="11" fill="#E65100">ID fonction ∈ {0, 1, 2, 3, 4,...}</text>

  <!-- Flèches des entrées -->
  <line x1="152" y1="153" x2="152" y2="178" stroke="#1565C0" stroke-width="1.8" marker-end="url(#arr)"/>
  <line x1="452" y1="153" x2="452" y2="178" stroke="#2E7D32" stroke-width="1.8" marker-end="url(#arr)"/>
  <line x1="752" y1="153" x2="752" y2="178" stroke="#6A1B9A" stroke-width="1.8" marker-end="url(#arr)"/>
  <line x1="1075" y1="153" x2="1075" y2="178" stroke="#E65100" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- ===== SECTION 2 : EMBEDDING BLOCK ===== -->
  <rect x="8" y="180" width="1234" height="215" rx="8" fill="#FAFAFA" stroke="#9E9E9E" stroke-width="1.5" stroke-dasharray="7,4"/>
  <text x="625" y="200" text-anchor="middle" font-size="13" font-weight="bold" fill="#4E342E">PROJECTION VERS L'ESPACE D'ATTENTION — chaque source → d_model=32, puis ⊕ additionnées</text>

  <!-- Sous-bloc 1 : Value + Lags -->
  <rect x="18" y="210" width="370" height="175" rx="6" fill="#FFFDE7" stroke="#F9A825" stroke-width="1.8"/>
  <text x="203" y="229" text-anchor="middle" font-size="12" font-weight="bold" fill="#5D4037">① ValueEmbedding — lags</text>
  <text x="203" y="248" text-anchor="middle" font-size="11" fill="#5D4037">past_values → 22 copies décalées</text>
  <text x="203" y="264" text-anchor="middle" font-size="11" fill="#5D4037">valeur courante (B,240,1)</text>
  <text x="203" y="280" text-anchor="middle" font-size="11" fill="#5D4037">+ lags [1,2,…,182 min] (B,240,22)</text>
  <text x="203" y="296" text-anchor="middle" font-size="11" fill="#5D4037">concat → (B, 240, 23)</text>
  <rect x="60" y="305" width="286" height="24" rx="4" fill="#FFF9C4" stroke="#F9A825" stroke-width="1.2"/>
  <text x="203" y="322" text-anchor="middle" font-size="11" fill="#3E2723">Linear(23 → 32)</text>
  <line x1="203" y1="329" x2="203" y2="368" stroke="#F9A825" stroke-width="1.5" marker-end="url(#arrY)"/>
  <text x="203" y="383" text-anchor="middle" font-size="12" font-weight="bold" fill="#33691E">→ (B, 240, 32)</text>

  <!-- Sous-bloc 2 : Time features -->
  <rect x="403" y="210" width="432" height="175" rx="6" fill="#FFFDE7" stroke="#F9A825" stroke-width="1.8"/>
  <text x="619" y="229" text-anchor="middle" font-size="12" font-weight="bold" fill="#5D4037">② TimeFeatureEmbedding</text>
  <text x="619" y="248" text-anchor="middle" font-size="11" fill="#5D4037">past_time_features[:, :240, :] → (B, 240, 6)</text>
  <text x="619" y="264" text-anchor="middle" font-size="11" fill="#5D4037">6 features par pas : sin_h, cos_h,</text>
  <text x="619" y="280" text-anchor="middle" font-size="11" fill="#5D4037">sin_d, cos_d, sin_sem, log_age ∈ ℝ</text>
  <rect x="472" y="295" width="294" height="24" rx="4" fill="#FFF9C4" stroke="#F9A825" stroke-width="1.2"/>
  <text x="619" y="312" text-anchor="middle" font-size="11" fill="#3E2723">Linear(6 → 32)</text>
  <line x1="619" y1="319" x2="619" y2="358" stroke="#F9A825" stroke-width="1.5" marker-end="url(#arrY)"/>
  <text x="619" y="383" text-anchor="middle" font-size="12" font-weight="bold" fill="#33691E">→ (B, 240, 32)</text>

  <!-- Sous-bloc 3 : Static -->
  <rect x="850" y="210" width="384" height="175" rx="6" fill="#FFFDE7" stroke="#F9A825" stroke-width="1.8"/>
  <text x="1042" y="229" text-anchor="middle" font-size="12" font-weight="bold" fill="#5D4037">③ StaticFeatureEmbedding</text>
  <text x="1042" y="248" text-anchor="middle" font-size="11" fill="#5D4037">(B,1) → Embedding(5, 2) → (B, 2)</text>
  <text x="1042" y="264" text-anchor="middle" font-size="11" fill="#5D4037">broadcast → (B, 240, 2)</text>
  <text x="1042" y="280" text-anchor="middle" font-size="11" fill="#5D4037">[même vecteur sur les 240 positions]</text>
  <rect x="908" y="295" width="268" height="24" rx="4" fill="#FFF9C4" stroke="#F9A825" stroke-width="1.2"/>
  <text x="1042" y="312" text-anchor="middle" font-size="11" fill="#3E2723">Linear(2 → 32)</text>
  <line x1="1042" y1="319" x2="1042" y2="358" stroke="#F9A825" stroke-width="1.5" marker-end="url(#arrY)"/>
  <text x="1042" y="383" text-anchor="middle" font-size="12" font-weight="bold" fill="#33691E">→ (B, 240, 32)</text>

  <!-- Somme ⊕ et résultat -->
  <text x="203" y="399" text-anchor="middle" font-size="20" fill="#333">⊕</text>
  <text x="625" y="399" text-anchor="middle" font-size="20" fill="#333">⊕</text>
  <text x="1044" y="399" text-anchor="middle" font-size="20" fill="#333">⊕</text>
  <line x1="203" y1="401" x2="203" y2="410" stroke="#333" stroke-width="1"/>
  <line x1="625" y1="401" x2="625" y2="410" stroke="#333" stroke-width="1"/>
  <line x1="1044" y1="401" x2="1044" y2="410" stroke="#333" stroke-width="1"/>

  <!-- Flèche vers encoder input -->
  <line x1="625" y1="397" x2="625" y2="420" stroke="#333" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ===== encoder_input ===== -->
  <rect x="380" y="421" width="490" height="38" rx="6" fill="#E8EAF6" stroke="#3949AB" stroke-width="2"/>
  <text x="625" y="436" text-anchor="middle" font-size="12" font-weight="bold" fill="#1A237E">encoder_input  (B, 240, 32)</text>
  <text x="625" y="452" text-anchor="middle" font-size="11" fill="#3949AB">240 positions · chacune = vecteur de 32 réels dans l'espace d'attention</text>

  <line x1="625" y1="460" x2="625" y2="482" stroke="#333" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ===== SECTION 3 : COUCHE ENCODEUR (détail) ===== -->
  <rect x="25" y="484" width="1200" height="355" rx="8" fill="#ECEFF1" stroke="#455A64" stroke-width="2"/>
  <text x="625" y="503" text-anchor="middle" font-size="13" font-weight="bold" fill="#263238">COUCHE ENCODEUR — détail couche 1/4  (×4 couches identiques)</text>
  <text x="625" y="519" text-anchor="middle" font-size="11" fill="#546E7A" font-style="italic">entrée : (B, 240, 32)  →  sortie : (B, 240, 32)  — la longueur de séquence est CONSERVÉE</text>

  <!-- ── Multi-Head Self-Attention ── -->
  <rect x="40" y="526" width="1185" height="162" rx="6" fill="#FAFAFA" stroke="#78909C" stroke-width="1.2"/>
  <text x="632" y="545" text-anchor="middle" font-size="12" font-weight="bold" fill="#37474F">Multi-Head Self-Attention (n_heads=2 · head_dim=d_model/n_heads=16)</text>

  <!-- Q, K, V projections -->
  <rect x="55" y="555" width="210" height="52" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.2"/>
  <text x="160" y="573" text-anchor="middle" font-size="11" font-weight="bold" fill="#0D47A1">Q = Linear(32→32)</text>
  <text x="160" y="589" text-anchor="middle" font-size="11" fill="#0D47A1">(B,240,32) → (B,2,240,16)</text>
  <text x="160" y="599" text-anchor="middle" font-size="10" fill="#1565C0" font-style="italic">2 têtes × 16 dims</text>

  <rect x="280" y="555" width="210" height="52" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.2"/>
  <text x="385" y="573" text-anchor="middle" font-size="11" font-weight="bold" fill="#0D47A1">K = Linear(32→32)</text>
  <text x="385" y="589" text-anchor="middle" font-size="11" fill="#0D47A1">(B,240,32) → (B,2,240,16)</text>
  <text x="385" y="599" text-anchor="middle" font-size="10" fill="#1565C0" font-style="italic">Q=K=V (self-attention)</text>

  <rect x="505" y="555" width="210" height="52" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.2"/>
  <text x="610" y="573" text-anchor="middle" font-size="11" font-weight="bold" fill="#0D47A1">V = Linear(32→32)</text>
  <text x="610" y="589" text-anchor="middle" font-size="11" fill="#0D47A1">(B,240,32) → (B,2,240,16)</text>
  <text x="610" y="599" text-anchor="middle" font-size="10" fill="#1565C0" font-style="italic">aucun masque causal</text>

  <!-- Attention scores -->
  <rect x="730" y="548" width="480" height="70" rx="5" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="970" y="568" text-anchor="middle" font-size="11" font-weight="bold" fill="#1B5E20">Scores = softmax( Q·Kᵀ / √16 )</text>
  <text x="970" y="586" text-anchor="middle" font-size="13" font-weight="bold" fill="#1B5E20">→ (B, 2, 240, 240)</text>
  <text x="970" y="602" text-anchor="middle" font-size="10" fill="#2E7D32" font-style="italic">⬆ sauvegardés via output_attentions=True (pour H3)</text>
  <text x="970" y="613" text-anchor="middle" font-size="10" fill="#2E7D32" font-style="italic">encoder_attentions[-1] shape (256, 2, 240, 240)</text>

  <!-- Output self-attention -->
  <line x1="625" y1="608" x2="625" y2="632" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="430" y="633" width="390" height="28" rx="4" fill="#CFD8DC" stroke="#455A64" stroke-width="1.2"/>
  <text x="625" y="651" text-anchor="middle" font-size="11" fill="#263238">Scores × V → concat 2 têtes → Linear(32→32) → (B, 240, 32)</text>

  <!-- Add & LayerNorm 1 -->
  <line x1="625" y1="661" x2="625" y2="680" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="445" y="681" width="360" height="24" rx="4" fill="#E0E0E0" stroke="#616161" stroke-width="1.2"/>
  <text x="625" y="698" text-anchor="middle" font-size="11" font-weight="bold" fill="#212121">Résidu + LayerNorm → (B, 240, 32)</text>

  <!-- FFN -->
  <line x1="625" y1="705" x2="625" y2="724" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="380" y="725" width="490" height="38" rx="5" fill="#FFF3E0" stroke="#EF6C00" stroke-width="1.5"/>
  <text x="625" y="742" text-anchor="middle" font-size="11" font-weight="bold" fill="#E65100">FFN : Linear(32→32) → GELU → Linear(32→32)</text>
  <text x="625" y="756" text-anchor="middle" font-size="11" fill="#EF6C00">→ (B, 240, 32)   [ffn_dim = d_model = 32]</text>

  <!-- Add & LayerNorm 2 -->
  <line x1="625" y1="764" x2="625" y2="782" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="445" y="783" width="360" height="24" rx="4" fill="#E0E0E0" stroke="#616161" stroke-width="1.2"/>
  <text x="625" y="800" text-anchor="middle" font-size="11" font-weight="bold" fill="#212121">Résidu + LayerNorm → (B, 240, 32)</text>

  <!-- ===== × 3 couches ===== -->
  <line x1="625" y1="840" x2="625" y2="860" stroke="#333" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="340" y="843" width="570" height="32" rx="6" fill="#B0BEC5" stroke="#455A64" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="625" y="864" text-anchor="middle" font-size="12" font-weight="bold" fill="#263238">× 3 couches identiques (couches 2 / 3 / 4)</text>

  <!-- ===== OUTPUT ===== -->
  <line x1="625" y1="875" x2="625" y2="898" stroke="#333" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="250" y="899" width="750" height="62" rx="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="2.5"/>
  <text x="625" y="921" text-anchor="middle" font-size="14" font-weight="bold" fill="#0D47A1">encoder_last_hidden_state</text>
  <text x="625" y="940" text-anchor="middle" font-size="13" font-weight="bold" fill="#0D47A1">(B, 240, 32)</text>
  <text x="625" y="957" text-anchor="middle" font-size="11" fill="#1565C0" font-style="italic">→ fourni comme Keys (K) et Values (V) à chaque couche cross-attention du décodeur</text>
</svg>
