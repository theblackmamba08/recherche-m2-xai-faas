<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 1480" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="14" fill="#1f2937">

  <!-- ========== DEFINITIONS ========== -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#1f2937"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#2563eb"/>
    </marker>
  </defs>

  <!-- background blanc explicite (pour PowerPoint / Beamer) -->
  <rect x="0" y="0" width="1100" height="1480" fill="#ffffff"/>

  <!-- ========== TITRE ========== -->
  <text x="550" y="42" text-anchor="middle" font-size="26" font-weight="700">
    TimeSeriesTransformer — Architecture globale
  </text>
  <text x="550" y="72" text-anchor="middle" font-size="14" fill="#6b7280" font-style="italic">
    Pipeline FAYAM (HuggingFace) — la contribution H1 SoftCAM se greffe sur la Distribution Head
  </text>

  <!-- ========== INPUTS (4 boîtes jaunes) ========== -->
  <!-- past_values -->
  <g>
    <rect x="65" y="120" width="220" height="80" rx="10" fill="#fff7e0" stroke="#d4a017" stroke-width="1.5"/>
    <text x="175" y="148" text-anchor="middle" font-weight="600" font-size="15">past_values</text>
    <text x="175" y="172" text-anchor="middle" font-size="12" font-family="'Courier New', Courier, monospace" fill="#15803d">(B, 240+max_lag)</text>
    <text x="175" y="190" text-anchor="middle" font-size="11" font-style="italic" fill="#6b7280">valeurs brutes du passé</text>
  </g>

  <!-- past_time_features -->
  <g>
    <rect x="315" y="120" width="220" height="80" rx="10" fill="#fff7e0" stroke="#d4a017" stroke-width="1.5"/>
    <text x="425" y="148" text-anchor="middle" font-weight="600" font-size="15">past_time_features</text>
    <text x="425" y="172" text-anchor="middle" font-size="12" font-family="'Courier New', Courier, monospace" fill="#15803d">(B, 240, F)</text>
    <text x="425" y="190" text-anchor="middle" font-size="11" font-style="italic" fill="#6b7280">minute, jour, age, …</text>
  </g>

  <!-- future_time_features -->
  <g>
    <rect x="565" y="120" width="220" height="80" rx="10" fill="#fff7e0" stroke="#d4a017" stroke-width="1.5"/>
    <text x="675" y="148" text-anchor="middle" font-weight="600" font-size="15">future_time_features</text>
    <text x="675" y="172" text-anchor="middle" font-size="12" font-family="'Courier New', Courier, monospace" fill="#15803d">(B, 120, F)</text>
    <text x="675" y="190" text-anchor="middle" font-size="11" font-style="italic" fill="#6b7280">même F que past</text>
  </g>

  <!-- static_categorical -->
  <g>
    <rect x="815" y="120" width="220" height="80" rx="10" fill="#fff7e0" stroke="#d4a017" stroke-width="1.5"/>
    <text x="925" y="148" text-anchor="middle" font-weight="600" font-size="15">static_categorical</text>
    <text x="925" y="172" text-anchor="middle" font-size="12" font-family="'Courier New', Courier, monospace" fill="#15803d">(B, num_static_cat)</text>
    <text x="925" y="190" text-anchor="middle" font-size="11" font-style="italic" fill="#6b7280">id série / cluster</text>
  </g>

  <!-- ========== PRÉPARATION (gris) ========== -->
  <g>
    <rect x="60" y="225" width="980" height="75" rx="10" fill="#f3f4f6" stroke="#6b7280" stroke-width="1.5"/>
    <text x="550" y="252" text-anchor="middle" font-weight="600" font-size="16">Préparation des features</text>
    <text x="550" y="275" text-anchor="middle" font-size="13" fill="#374151">MeanScaler  •  Lag Selector  •  Embedder (static cat. → dense)  •  Concat</text>
    <text x="550" y="293" text-anchor="middle" font-size="11" font-style="italic" fill="#6b7280">deux flux préparés en sortie : input passé → encodeur, input futur → décodeur</text>
  </g>

  <!-- ========== ENCODER (bleu) ========== -->
  <g>
    <rect x="140" y="325" width="820" height="175" rx="14" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="550" y="365" text-anchor="middle" font-weight="700" font-size="24" fill="#1e3a8a">ENCODER × 4</text>
    <text x="550" y="390" text-anchor="middle" font-size="13" font-style="italic" fill="#1e40af">empile 4 couches identiques</text>

    <text x="200" y="425" font-size="13" fill="#1e3a8a">▸  MultiHead Self-Attention   →   Add &amp; Norm</text>
    <text x="200" y="450" font-size="13" fill="#1e3a8a">▸  Feed-Forward (FFN)              →   Add &amp; Norm</text>
    <text x="200" y="475" font-size="13" fill="#1e3a8a">▸  Sortie : memory contextuelle des 240 pas du passé</text>

    <!-- shape entrée à gauche -->
    <text x="135" y="332" text-anchor="end" font-size="12" font-family="'Courier New', Courier, monospace" fill="#15803d">(B, 240, d_in)</text>
  </g>

  <!-- ========== DECODER (vert) ========== -->
  <g>
    <rect x="140" y="540" width="820" height="200" rx="14" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="550" y="580" text-anchor="middle" font-weight="700" font-size="24" fill="#14532d">DECODER × 4</text>
    <text x="550" y="605" text-anchor="middle" font-size="13" font-style="italic" fill="#166534">empile 4 couches identiques</text>

    <text x="200" y="640" font-size="13" fill="#14532d">▸  Masked Self-Attention   (le futur ne « voit » pas devant lui)</text>
    <text x="200" y="663" font-size="13" fill="#14532d">▸  Cross-Attention   (Q ← decoder, K et V ← memory encoder)</text>
    <text x="200" y="686" font-size="13" fill="#14532d">▸  Feed-Forward (FFN)        →   Add &amp; Norm (entre chaque sous-bloc)</text>
    <text x="200" y="709" font-size="13" fill="#14532d">▸  Sortie : représentation des 120 pas futurs prédits</text>

    <!-- shape entrée -->
    <text x="135" y="547" text-anchor="end" font-size="12" font-family="'Courier New', Courier, monospace" fill="#15803d">(B, 120, d_in)</text>
  </g>

  <!-- ========== DISTRIBUTION HEAD (rouge) — CIBLE H1 ========== -->
  <g>
    <rect x="140" y="785" width="820" height="160" rx="14" fill="#fee2e2" stroke="#dc2626" stroke-width="3"/>
    <text x="550" y="822" text-anchor="middle" font-weight="700" font-size="24" fill="#7f1d1d">DISTRIBUTION HEAD</text>
    <text x="550" y="848" text-anchor="middle" font-size="14" fill="#991b1b">Linear (32 → 3)   →   paramètres Student-T   (loc, scale, df)</text>
    <text x="550" y="872" text-anchor="middle" font-size="13" font-style="italic" fill="#991b1b">échantillonnage de 100 trajectoires  →  médiane  →  forecast</text>

    <!-- bulle rouge cible H1 -->
    <rect x="270" y="893" width="560" height="40" rx="20" fill="#dc2626"/>
    <text x="550" y="920" text-anchor="middle" font-weight="700" font-size="15" fill="#ffffff">⚡  CIBLE H1 SOFTCAM  —  greffe de la couche d'évidence ici  ⚡</text>

    <!-- shape entrée -->
    <text x="135" y="792" text-anchor="end" font-size="12" font-family="'Courier New', Courier, monospace" fill="#15803d">(B, 120, 32)</text>
  </g>

  <!-- ========== FORECAST OUTPUT ========== -->
  <g>
    <rect x="350" y="985" width="400" height="60" rx="10" fill="#f9fafb" stroke="#1f2937" stroke-width="1.5"/>
    <text x="550" y="1014" text-anchor="middle" font-weight="600" font-size="16">forecast</text>
    <text x="550" y="1034" text-anchor="middle" font-size="12" font-family="'Courier New', Courier, monospace" fill="#15803d">(B, 120)   —   120 pas futurs prédits</text>
  </g>

  <!-- ========== FLÈCHES ========== -->
  <!-- Inputs → Préparation : 4 flèches verticales courtes -->
  <line x1="175" y1="200" x2="175" y2="223" stroke="#1f2937" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="425" y1="200" x2="425" y2="223" stroke="#1f2937" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="675" y1="200" x2="675" y2="223" stroke="#1f2937" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="925" y1="200" x2="925" y2="223" stroke="#1f2937" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Préparation → Encoder (centré) -->
  <line x1="550" y1="300" x2="550" y2="323" stroke="#1f2937" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Encoder → Decoder (memory, pointillée bleue) -->
  <line x1="550" y1="500" x2="550" y2="538" stroke="#2563eb" stroke-width="2.5" stroke-dasharray="6 4" marker-end="url(#arrow-blue)"/>
  <text x="565" y="518" font-size="13" font-weight="700" fill="#2563eb">memory</text>
  <text x="565" y="534" font-size="11" font-family="'Courier New', Courier, monospace" fill="#15803d">(B, 240, 32)</text>

  <!-- Decoder → Distribution Head -->
  <line x1="550" y1="740" x2="550" y2="783" stroke="#1f2937" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Head → Forecast -->
  <line x1="550" y1="945" x2="550" y2="983" stroke="#1f2937" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ========== LÉGENDE ========== -->
  <g>
    <rect x="65" y="1080" width="970" height="370" rx="10" fill="#fafafa" stroke="#d1d5db" stroke-width="1"/>

    <text x="85" y="1108" font-weight="700" font-size="16">Légende</text>

    <!-- ─── Colonne 1 : Code couleur ─── -->
    <text x="85" y="1140" font-weight="600" font-size="14" fill="#374151">Code couleur</text>

    <rect x="85" y="1153" width="22" height="22" rx="4" fill="#fff7e0" stroke="#d4a017" stroke-width="1.5"/>
    <text x="118" y="1170" font-size="13"><tspan font-weight="700">Entrées</tspan> — tenseurs en entrée du modèle</text>

    <rect x="85" y="1183" width="22" height="22" rx="4" fill="#f3f4f6" stroke="#6b7280" stroke-width="1.5"/>
    <text x="118" y="1200" font-size="13"><tspan font-weight="700">Préparation</tspan> — MeanScaler · Lag Selector · Embedder · Concat</text>

    <rect x="85" y="1213" width="22" height="22" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
    <text x="118" y="1230" font-size="13"><tspan font-weight="700">Encodeur</tspan> — encode 240 pas du passé en une memory contextuelle</text>

    <rect x="85" y="1243" width="22" height="22" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
    <text x="118" y="1260" font-size="13"><tspan font-weight="700">Décodeur</tspan> — génère 120 pas futurs en consultant la memory</text>

    <rect x="85" y="1273" width="22" height="22" rx="4" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="118" y="1290" font-size="13"><tspan font-weight="700">Distribution Head</tspan> — projection vers paramètres Student-T  →  <tspan font-weight="700" fill="#dc2626">cible H1</tspan></text>

    <line x1="85" y1="1313" x2="107" y2="1313" stroke="#2563eb" stroke-width="2.5" stroke-dasharray="6 4"/>
    <polygon points="107,1310 113,1313 107,1316" fill="#2563eb"/>
    <text x="118" y="1318" font-size="13"><tspan font-weight="700">Cross-attention</tspan> — la memory de l'encodeur consultée par chaque couche du décodeur</text>

    <!-- ─── Colonne 2 : Hyperparamètres ─── -->
    <text x="580" y="1140" font-weight="600" font-size="14" fill="#374151">Hyperparamètres clés (FAYAM)</text>

    <text x="580" y="1167" font-size="13" font-family="'Courier New', Courier, monospace" fill="#1e40af">context_length</text>
    <text x="730" y="1167" font-size="13">= 240 min  (4 h de passé)</text>

    <text x="580" y="1188" font-size="13" font-family="'Courier New', Courier, monospace" fill="#1e40af">prediction_length</text>
    <text x="730" y="1188" font-size="13">= 120 min  (2 h de futur)</text>

    <text x="580" y="1209" font-size="13" font-family="'Courier New', Courier, monospace" fill="#1e40af">d_model</text>
    <text x="730" y="1209" font-size="13">= 32  (taille embedding interne)</text>

    <text x="580" y="1230" font-size="13" font-family="'Courier New', Courier, monospace" fill="#1e40af">encoder_layers</text>
    <text x="730" y="1230" font-size="13">= 4</text>

    <text x="580" y="1251" font-size="13" font-family="'Courier New', Courier, monospace" fill="#1e40af">decoder_layers</text>
    <text x="730" y="1251" font-size="13">= 4</text>

    <text x="580" y="1272" font-size="13" font-family="'Courier New', Courier, monospace" fill="#1e40af">freq</text>
    <text x="730" y="1272" font-size="13">= "1T"   (pas de 1 minute)</text>

    <text x="580" y="1300" font-size="11" font-style="italic" fill="#6b7280">Source : code/src/baseline/fayam/tsf_transf.py</text>

    <!-- Note de bas de visuel -->
    <line x1="85" y1="1370" x2="1015" y2="1370" stroke="#e5e7eb" stroke-width="1"/>
    <text x="85" y="1395" font-size="12" font-style="italic" fill="#6b7280">
      Visuel 1 / 4 — Vue globale.   Détails dans les zooms à venir : encodeur (V2), décodeur (V3), distribution head + greffe SoftCAM (V4).
    </text>
    <text x="85" y="1418" font-size="12" font-style="italic" fill="#6b7280">
      Cible H1 retenue : cluster 4 (R² = 0.37, Spearman = 0.92, sMAPE = 0.22).   Cf. memoire/00-meta/DECISIONS.md (entrée 2026-05-05).
    </text>
  </g>

</svg>
