<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1100" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="14" fill="#1f2937">

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#1f2937"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#dc2626"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1400" height="1100" fill="#ffffff"/>

  <!-- ========== TITRE ========== -->
  <text x="700" y="40" text-anchor="middle" font-size="26" font-weight="700">
    DISTRIBUTION HEAD — Greffe de la contribution H1 SoftCAM
  </text>
  <text x="700" y="68" text-anchor="middle" font-size="14" fill="#6b7280" font-style="italic">
    Comparaison côte à côte : architecture FAYAM (gauche)  vs  architecture H1 enrichie d'une couche d'évidence (droite)
  </text>

  <!-- ========== HEADERS ========== -->
  <g>
    <rect x="30" y="95" width="640" height="40" rx="8" fill="#374151"/>
    <text x="350" y="121" text-anchor="middle" font-weight="700" font-size="16" fill="#ffffff">AVANT — FAYAM baseline</text>
  </g>
  <g>
    <rect x="730" y="95" width="640" height="40" rx="8" fill="#7f1d1d"/>
    <text x="1050" y="121" text-anchor="middle" font-weight="700" font-size="16" fill="#ffffff">APRÈS — H1 SoftCAM (contribution)</text>
  </g>

  <!-- ============================================================== -->
  <!-- ============== PANNEAU GAUCHE — FAYAM ======================= -->
  <!-- ============================================================== -->

  <!-- Decoder output (commun aux deux) -->
  <g>
    <rect x="120" y="160" width="460" height="65" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="350" y="187" text-anchor="middle" font-weight="600" font-size="15" fill="#14532d">sortie du décodeur</text>
    <text x="350" y="208" text-anchor="middle" font-size="12" font-family="'Courier New', Courier, monospace" fill="#15803d">(B, 120, 32)</text>
  </g>

  <!-- Zone vide à gauche (en face de Couche d'évidence à droite) -->
  <g>
    <rect x="120" y="250" width="460" height="80" rx="10" fill="#fafafa" stroke="#d1d5db" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="350" y="282" text-anchor="middle" font-size="13" font-style="italic" fill="#9ca3af">(pas de couche d'évidence dans le baseline)</text>
    <text x="350" y="305" text-anchor="middle" font-size="11" font-style="italic" fill="#9ca3af">passage direct vers la projection finale</text>
  </g>

  <!-- Linear 32 → 3 -->
  <g>
    <rect x="120" y="355" width="460" height="65" rx="10" fill="#f3f4f6" stroke="#6b7280" stroke-width="1.5"/>
    <text x="350" y="382" text-anchor="middle" font-weight="600" font-size="15">projection finale</text>
    <text x="350" y="403" text-anchor="middle" font-size="12" font-family="'Courier New', Courier, monospace" fill="#1e40af">Linear(32 → 3)</text>
  </g>

  <!-- (loc, scale, df) -->
  <g>
    <rect x="120" y="450" width="460" height="65" rx="10" fill="#fff7e0" stroke="#d4a017" stroke-width="1.5"/>
    <text x="350" y="476" text-anchor="middle" font-weight="600" font-size="15">paramètres Student-T</text>
    <text x="350" y="498" text-anchor="middle" font-size="12" font-family="'Courier New', Courier, monospace" fill="#15803d">(loc, scale, df)   shape : (B, 120, 3)</text>
  </g>

  <!-- StudentT distribution -->
  <g>
    <rect x="120" y="545" width="460" height="65" rx="10" fill="#e0e7ff" stroke="#4f46e5" stroke-width="1.5"/>
    <text x="350" y="571" text-anchor="middle" font-weight="600" font-size="15" fill="#3730a3">distribution Student-T</text>
    <text x="350" y="593" text-anchor="middle" font-size="12" font-style="italic" fill="#4338ca">une distribution par pas futur</text>
  </g>

  <!-- Sample + médiane -->
  <g>
    <rect x="120" y="640" width="460" height="65" rx="10" fill="#f3f4f6" stroke="#6b7280" stroke-width="1.5"/>
    <text x="350" y="666" text-anchor="middle" font-weight="600" font-size="15">échantillonnage  →  médiane</text>
    <text x="350" y="688" text-anchor="middle" font-size="12" font-style="italic" fill="#374151">100 trajectoires tirées, on garde la médiane par pas</text>
  </g>

  <!-- Forecast -->
  <g>
    <rect x="120" y="735" width="460" height="65" rx="10" fill="#f9fafb" stroke="#1f2937" stroke-width="2"/>
    <text x="350" y="762" text-anchor="middle" font-weight="700" font-size="16">forecast</text>
    <text x="350" y="783" text-anchor="middle" font-size="12" font-family="'Courier New', Courier, monospace" fill="#15803d">(B, 120)</text>
  </g>

  <!-- Flèches gauche -->
  <line x1="350" y1="225" x2="350" y2="248" stroke="#1f2937" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="350" y1="330" x2="350" y2="353" stroke="#1f2937" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="350" y1="420" x2="350" y2="448" stroke="#1f2937" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="350" y1="515" x2="350" y2="543" stroke="#1f2937" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="350" y1="610" x2="350" y2="638" stroke="#1f2937" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="350" y1="705" x2="350" y2="733" stroke="#1f2937" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ============================================================== -->
  <!-- ============== PANNEAU DROIT — H1 SoftCAM =================== -->
  <!-- ============================================================== -->

  <!-- Decoder output -->
  <g>
    <rect x="820" y="160" width="460" height="65" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="1050" y="187" text-anchor="middle" font-weight="600" font-size="15" fill="#14532d">sortie du décodeur</text>
    <text x="1050" y="208" text-anchor="middle" font-size="12" font-family="'Courier New', Courier, monospace" fill="#15803d">(B, 120, 32)</text>
  </g>

  <!-- COUCHE D'ÉVIDENCE — élément phare -->
  <g>
    <rect x="800" y="245" width="500" height="90" rx="14" fill="#fee2e2" stroke="#dc2626" stroke-width="3"/>
    <text x="1050" y="278" text-anchor="middle" font-weight="700" font-size="20" fill="#7f1d1d">⚡  COUCHE D'ÉVIDENCE  ⚡</text>
    <text x="1050" y="302" text-anchor="middle" font-size="13" fill="#991b1b">équivalent temporel d'une convolution 1×1 (SoftCAM, Djoumessi 2025)</text>
    <text x="1050" y="322" text-anchor="middle" font-size="12" font-family="'Courier New', Courier, monospace" fill="#7f1d1d">Linear(32 → 32)  apprenable, régularisé ElasticNet</text>
  </g>

  <!-- Annotation evidence_map sur la flèche descendante -->
  <g>
    <rect x="1100" y="350" width="280" height="38" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="1240" y="376" text-anchor="middle" font-weight="700" font-size="13" fill="#92400e">evidence_map  =  ce qu'on visualise</text>
  </g>
  <line x1="1050" y1="370" x2="1100" y2="370" stroke="#f59e0b" stroke-width="2"/>

  <!-- Linear 32 → 3 -->
  <g>
    <rect x="820" y="355" width="460" height="65" rx="10" fill="#f3f4f6" stroke="#6b7280" stroke-width="1.5"/>
    <text x="1050" y="382" text-anchor="middle" font-weight="600" font-size="15">projection finale</text>
    <text x="1050" y="403" text-anchor="middle" font-size="12" font-family="'Courier New', Courier, monospace" fill="#1e40af">Linear(32 → 3)</text>
  </g>

  <!-- (loc, scale, df) -->
  <g>
    <rect x="820" y="450" width="460" height="65" rx="10" fill="#fff7e0" stroke="#d4a017" stroke-width="1.5"/>
    <text x="1050" y="476" text-anchor="middle" font-weight="600" font-size="15">paramètres Student-T</text>
    <text x="1050" y="498" text-anchor="middle" font-size="12" font-family="'Courier New', Courier, monospace" fill="#15803d">(loc, scale, df)   shape : (B, 120, 3)</text>
  </g>

  <!-- StudentT distribution -->
  <g>
    <rect x="820" y="545" width="460" height="65" rx="10" fill="#e0e7ff" stroke="#4f46e5" stroke-width="1.5"/>
    <text x="1050" y="571" text-anchor="middle" font-weight="600" font-size="15" fill="#3730a3">distribution Student-T</text>
    <text x="1050" y="593" text-anchor="middle" font-size="12" font-style="italic" fill="#4338ca">une distribution par pas futur</text>
  </g>

  <!-- Sample + médiane -->
  <g>
    <rect x="820" y="640" width="460" height="65" rx="10" fill="#f3f4f6" stroke="#6b7280" stroke-width="1.5"/>
    <text x="1050" y="666" text-anchor="middle" font-weight="600" font-size="15">échantillonnage  →  médiane</text>
    <text x="1050" y="688" text-anchor="middle" font-size="12" font-style="italic" fill="#374151">100 trajectoires tirées, on garde la médiane par pas</text>
  </g>

  <!-- Forecast -->
  <g>
    <rect x="820" y="735" width="460" height="65" rx="10" fill="#f9fafb" stroke="#1f2937" stroke-width="2"/>
    <text x="1050" y="762" text-anchor="middle" font-weight="700" font-size="16">forecast</text>
    <text x="1050" y="783" text-anchor="middle" font-size="12" font-family="'Courier New', Courier, monospace" fill="#15803d">(B, 120)</text>
  </g>

  <!-- Flèches droite -->
  <line x1="1050" y1="225" x2="1050" y2="243" stroke="#1f2937" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="1050" y1="335" x2="1050" y2="353" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow-red)"/>
  <line x1="1050" y1="420" x2="1050" y2="448" stroke="#1f2937" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="1050" y1="515" x2="1050" y2="543" stroke="#1f2937" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="1050" y1="610" x2="1050" y2="638" stroke="#1f2937" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="1050" y1="705" x2="1050" y2="733" stroke="#1f2937" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ========== ENCADRÉ ELASTICNET (sous panneau droit) ========== -->
  <g>
    <rect x="730" y="830" width="640" height="120" rx="10" fill="#fff1f2" stroke="#dc2626" stroke-width="2"/>
    <text x="1050" y="857" text-anchor="middle" font-weight="700" font-size="15" fill="#7f1d1d">Régularisation ElasticNet sur la carte d'évidence  A</text>
    <text x="1050" y="885" text-anchor="middle" font-size="14" font-family="'Courier New', Courier, monospace" fill="#7f1d1d">Loss  =  L_prediction(forecast, y_true)  +  λ₁ · ||A||₁  +  λ₂ · ||A||₂²</text>
    <text x="755" y="912" font-size="12" fill="#991b1b"><tspan font-weight="700">λ₁  ||A||₁</tspan>  pousse la carte vers la <tspan font-weight="600">parcimonie</tspan> (peu de pas vraiment actifs)</text>
    <text x="755" y="932" font-size="12" fill="#991b1b"><tspan font-weight="700">λ₂  ||A||₂²</tspan>  pousse la carte vers la <tspan font-weight="600">stabilité</tspan> (pas de discontinuités)</text>
  </g>

  <!-- ========== NOTE COMPARAISON FORECASTS ========== -->
  <line x1="350" y1="820" x2="650" y2="820" stroke="#16a34a" stroke-width="2" stroke-dasharray="6 4"/>
  <line x1="650" y1="820" x2="660" y2="824" stroke="#16a34a" stroke-width="2"/>
  <line x1="650" y1="820" x2="660" y2="816" stroke="#16a34a" stroke-width="2"/>
  <text x="500" y="812" text-anchor="middle" font-size="11" font-style="italic" fill="#166534">H1.C : même qualité prédictive attendue (R² ≥ 0.30, Spearman ≥ 0.85)</text>

  <!-- ========== NOTE DE PIED ========== -->
  <line x1="30" y1="980" x2="1370" y2="980" stroke="#e5e7eb" stroke-width="1"/>
  <text x="30" y="1005" font-size="12" font-style="italic" fill="#6b7280">
    Visuel 4 / 4 — Greffe SoftCAM.   La  evidence_map  (B, 120, 32) est la sortie de la couche d'évidence  →  c'est l'objet visualisable qui sert d'explication.
  </text>
  <text x="30" y="1028" font-size="12" font-style="italic" fill="#6b7280">
    Validation expérimentale prévue sur le cluster 4 (R² baseline = 0.37, Spearman = 0.92).   Cf.  memoire/00-meta/DECISIONS.md (entrée 2026-05-05).
  </text>
  <text x="30" y="1051" font-size="12" font-style="italic" fill="#6b7280">
    Inspiration : Djoumessi &amp; Berens 2025, « SoftCAM », arXiv:2505.17748 — adaptation du principe « class-evidence layer + ElasticNet » du CNN au TimeSeriesTransformer.
  </text>
  <text x="30" y="1074" font-size="12" font-style="italic" fill="#6b7280">
    Hypothèses opératoires testables : H1.A (carte = heures du profil journalier) — H1.B (attention concentrée sur lags 1440 / 2880) — H1.D (cohérence intra-cluster).
  </text>

</svg>
